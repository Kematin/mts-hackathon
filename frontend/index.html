<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalScript — генератор Lua-кода</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 820px; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 16px 24px; border-bottom: 1px solid #1e2333; display: flex; align-items: center; gap: 10px; background: #0f1117; }
    .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; }
    .header-dot.disconnected { background: #E24B4A; }
    .header-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
    .header-sub { font-size: 12px; color: #64748b; margin-left: auto; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #1e2333; border-radius: 2px; }
    .msg { display: flex; flex-direction: column; gap: 6px; }
    .msg.user { align-items: flex-end; }
    .msg.agent { align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; max-width: 80%; }
    .bubble.user { background: #378ADD; color: #E6F1FB; border-bottom-right-radius: 4px; }
    .bubble.agent { background: #1a1f2e; color: #e2e8f0; border: 1px solid #1e2333; border-bottom-left-radius: 4px; }
    .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #64748b; padding: 4px 0; }
    .spinner { width: 14px; height: 14px; border: 2px solid #1e2333; border-top-color: #378ADD; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-done { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #639922; }
    .status-failed { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #E24B4A; }
    .check { width: 16px; height: 16px; border-radius: 50%; background: #639922; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cross { width: 16px; height: 16px; border-radius: 50%; background: #E24B4A; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .code-card { background: #1a1f2e; border: 1px solid #1e2333; border-radius: 12px; overflow: hidden; max-width: 90%; width: 100%; }
    .code-header { padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e2333; background: #141824; }
    .code-lang { font-size: 11px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .copy-btn { font-size: 11px; color: #64748b; background: none; border: 1px solid #1e2333; cursor: pointer; padding: 3px 8px; border-radius: 4px; transition: all 0.15s; }
    .copy-btn:hover { background: #1e2333; color: #e2e8f0; }
    .copy-btn.copied { color: #639922; border-color: #639922; }
    .code-card pre { margin: 0; padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.6; }
    .code-card pre::-webkit-scrollbar { height: 4px; }
    .code-card pre::-webkit-scrollbar-thumb { background: #1e2333; border-radius: 2px; }
    .code-card code { font-family: 'Fira Code', 'Cascadia Code', monospace; }
    .input-area { padding: 16px 24px 20px; border-top: 1px solid #1e2333; display: flex; flex-direction: column; gap: 10px; background: #0f1117; }
    .context-toggle { font-size: 12px; color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 5px; user-select: none; width: fit-content; transition: color 0.15s; }
    .context-toggle:hover { color: #94a3b8; }
    .ctx-arrow { transition: transform 0.2s; }
    .ctx-arrow.open { transform: rotate(90deg); }
    .context-area { border: 1px solid #1e2333; border-radius: 8px; padding: 10px 12px; font-family: 'Fira Code', monospace; font-size: 12px; color: #94a3b8; background: #141824; resize: none; height: 64px; width: 100%; outline: none; transition: border-color 0.15s; }
    .context-area:focus { border-color: #378ADD; }
    .context-area::placeholder { color: #334155; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .prompt-input { flex: 1; border: 1px solid #1e2333; border-radius: 24px; padding: 10px 18px; font-size: 14px; background: #141824; color: #e2e8f0; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .prompt-input:focus { border-color: #378ADD; }
    .prompt-input::placeholder { color: #334155; }
    .prompt-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: #378ADD; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
    .send-btn:hover { background: #185FA5; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #1e2333; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #334155; }
    .empty-text { font-size: 14px; }
    .warning-bubble { background: #1a1208; border: 1px solid #854F0B; color: #FAC775; font-size: 13px; padding: 10px 14px; border-radius: 8px; max-width: 80%; }
    .clarification-bubble {
      background: #1a1208;
      border: 1px solid #854F0B;
      border-radius: 12px;
      padding: 12px 14px;
      max-width: 80%;
    }
    .clarification-label {
      font-size: 11px;
      font-weight: 500;
      color: #FAC775;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .clarification-text {
      font-size: 14px;
      color: #e2e8f0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-dot disconnected" id="status-dot"></div>
      <div class="header-title">LocalScript</div>
      <div class="header-sub" id="status-text">подключение...</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="color:#334155">
          <rect x="4" y="8" width="32" height="24" rx="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13 16l-4 4 4 4M27 16l4 4-4 4M22 14l-4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div class="empty-text">напишите задачу чтобы сгенерировать Lua-код</div>
      </div>
    </div>

    <div class="input-area">
      <div class="context-toggle" onclick="toggleContext()">
        <svg class="ctx-arrow" id="ctx-arrow" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M3 2L7 5L3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        контекст wf.vars (опционально)
      </div>
      <textarea class="context-area" id="ctx-area" placeholder='{"wf": {"vars": {"emails": ["a@b.com", "c@d.com"]}}}' style="display: none;"></textarea>
      <div class="input-row">
        <input class="prompt-input" type="text" placeholder="напишите задачу на русском или английском..." id="prompt-input" disabled />
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const WS_URL = 'ws://localhost:8080/ws';
    let ws = null;
    let isProcessing = false;
    let currentStatusEl = null;

    function toggleContext() {
      const area = document.getElementById('ctx-area');
      const arrow = document.getElementById('ctx-arrow');
      const visible = area.style.display !== 'none';
      area.style.display = visible ? 'none' : 'block';
      arrow.classList.toggle('open', !visible);
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideEmpty() {
      const el = document.getElementById('empty-state');
      if (el) el.remove();
    }

    function addMessage(type, content) {
      hideEmpty();
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.innerHTML = content;
      msgs.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addUserMessage(text) {
      addMessage('user', '<div class="bubble user">' + escHtml(text) + '</div>');
    }

    function addStatus(text, type) {
      removeCurrentStatus();
      const icons = {
        loading: '<div class="spinner"></div>',
        done: '<div class="check"><svg width="8" height="8" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" fill="none"/></svg></div>',
        failed: '<div class="cross"><svg width="8" height="8" viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="white" stroke-width="1.5"/><line x1="8" y1="2" x2="2" y2="8" stroke="white" stroke-width="1.5"/></svg></div>',
      };
      const cls = type === 'done' ? 'status-done' : type === 'failed' ? 'status-failed' : 'status-row';
      const el = addMessage('agent', '<div class="' + cls + '">' + (icons[type] || icons.loading) + escHtml(text) + '</div>');
      if (type === 'loading') currentStatusEl = el;
      return el;
    }

    function removeCurrentStatus() {
      if (currentStatusEl) { currentStatusEl.remove(); currentStatusEl = null; }
    }

    function extractLuaCode(codeJson) {
      try {
        const obj = JSON.parse(codeJson);
        const results = [];
        for (const [key, val] of Object.entries(obj)) {
          if (typeof val === 'string' && val.startsWith('lua{') && val.endsWith('}lua')) {
            results.push({ key, code: val.slice(4, -4) });
          }
        }
        return results;
      } catch { return []; }
    }

    function addCodeBlock(codeJson) {
      const snippets = extractLuaCode(codeJson);
      if (snippets.length === 0) {
        addMessage('agent', '<div class="bubble agent">' + escHtml(codeJson) + '</div>');
        return;
      }
      for (const { key, code } of snippets) {
        const id = 'code-' + Math.random().toString(36).slice(2);
        const highlighted = hljs.highlight(code.trim(), { language: 'lua' }).value;
        addMessage('agent',
          '<div class="code-card">' +
            '<div class="code-header">' +
              '<span class="code-lang">lua — ' + escHtml(key) + '</span>' +
              '<button class="copy-btn" id="btn-' + id + '" onclick="copyCode(\'' + id + '\', this)">копировать</button>' +
            '</div>' +
            '<pre><code id="' + id + '" class="language-lua hljs">' + highlighted + '</code></pre>' +
          '</div>'
        );
      }
    }

    function copyCode(id, btn) {
      navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
        btn.textContent = 'скопировано';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'копировать'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setReady(ready) {
      document.getElementById('prompt-input').disabled = !ready;
      document.getElementById('send-btn').disabled = !ready;
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => {
        document.getElementById('status-dot').classList.remove('disconnected');
        document.getElementById('status-text').textContent = 'подключено';
        setReady(true);
      };
      ws.onclose = () => {
        document.getElementById('status-dot').classList.add('disconnected');
        document.getElementById('status-text').textContent = 'отключено — переподключение...';
        setReady(false);
        isProcessing = false;
        setTimeout(connect, 3000);
      };
      ws.onerror = () => {
        document.getElementById('status-text').textContent = 'ошибка соединения';
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.event) {
          case 'TASK_CREATED': break;
          case 'STATUS':
            removeCurrentStatus();
            addStatus(msg.message || msg.status, 'loading');
            break;
          case 'DONE':
            removeCurrentStatus();
            addStatus('готово', 'done');
            addCodeBlock(msg.code);
            isProcessing = false;
            setReady(true);
            break;
          case 'FAILED':
            removeCurrentStatus();
            addStatus('не удалось пройти валидацию', 'failed');
            if (msg.code) addCodeBlock(msg.code);
            if (msg.error) addMessage('agent', '<div class="warning-bubble">' + escHtml(msg.error) + '</div>');
            isProcessing = false;
            setReady(true);
            break;
          case 'ERROR':
            removeCurrentStatus();
            addStatus(msg.message || 'ошибка', 'failed');
            isProcessing = false;
            setReady(true);
            break;
          case 'CLARIFICATION':
            removeCurrentStatus();
            addClarificationQuestion(msg.question);
            isProcessing = false;
            setReady(true);
            break;
        }
      };
    }

    function sendMessage() {
      const input = document.getElementById('prompt-input');
      const ctx = document.getElementById('ctx-area');
      const prompt = input.value.trim();
      if (!prompt || isProcessing || !ws || ws.readyState !== WebSocket.OPEN) return;
      isProcessing = true;
      setReady(false);
      addUserMessage(prompt);
      const payload = { prompt };
      const context = ctx.value.trim();
      if (context) payload.context = context;
      ws.send(JSON.stringify(payload));
      input.value = '';
    }

    function addClarificationQuestion(question) {
      hideEmpty();
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg agent';
      div.innerHTML = 
        '<div class="clarification-bubble">' +
          '<div class="clarification-label">уточняющий вопрос</div>' +
          '<div class="clarification-text">' + escHtml(question) + '</div>' +
          '</div>';
      msgs.appendChild(div);
      scrollToBottom();
    }

    document.getElementById('prompt-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    connect();
  </script>
</body>
</html>
